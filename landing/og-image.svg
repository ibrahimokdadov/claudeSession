<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c10"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161b22" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.6"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#58a6ff"/>

  <!-- App name -->
  <text x="80" y="270"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="88" font-weight="700" letter-spacing="-2"
        fill="#58a6ff">claudeSession</text>

  <!-- Tagline -->
  <text x="80" y="340"
        font-family="'IBM Plex Sans', Arial, sans-serif"
        font-size="28" font-weight="400"
        fill="#7d8590">Session identity for Claude Code</text>

  <!-- Feature pills -->
  <rect x="80" y="400" width="160" height="32" rx="16" fill="#58a6ff" opacity="0.12"/>
  <text x="160" y="421" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#58a6ff">real-time</text>

  <rect x="256" y="400" width="180" height="32" rx="16" fill="#3fb950" opacity="0.12"/>
  <text x="346" y="421" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#3fb950">multi-session</text>

  <rect x="452" y="400" width="160" height="32" rx="16" fill="#e3b341" opacity="0.12"/>
  <text x="532" y="421" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#e3b341">Windows 11</text>

  <rect x="628" y="400" width="130" height="32" rx="16" fill="#58a6ff" opacity="0.12"/>
  <text x="693" y="421" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#58a6ff">open source</text>

  <!-- Domain badge -->
  <rect x="870" y="558" width="290" height="36" rx="6" fill="#58a6ff" opacity="0.1"/>
  <text x="1015" y="581" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-size="16"
        fill="#58a6ff">claudesession.whhite.com</text>
</svg>
